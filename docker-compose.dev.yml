services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    command:
      - sh
      - /app/docker/start-api-dev.sh
    ports:
      - "8001:8001"
    volumes:
      - ./apps/api:/app
      - api_vendor:/app/vendor
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - ./apps/web/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command:
      - sh
      - /app/docker/start-web-dev.sh
    ports:
      - "8080:8080"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  api_vendor:
  web_node_modules:
