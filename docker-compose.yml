services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/web/.env
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
